<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dream Club | Magic Bookshelf</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-yellow-50 text-gray-800 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-500 font-dream">

    <nav class="bg-white/35 dark:bg-gray-900/35 backdrop-blur-md shadow-xl sticky top-0 z-50 p-4 rounded-b-[30px] border-b border-white/30 dark:border-white/10">
        <div class="container mx-auto flex justify-between items-center mb-4">
            <div class="space-x-4 flex items-center">
                <a href="#books" class="font-bold text-blue-500 hover:scale-110 transition">Books</a>
                <a href="game.html" class="font-bold text-orange-500 hover:scale-110 transition">Games</a>
                <span id="authUserLabel" class="hidden text-sm font-black text-teal-600">Guest</span>
                <button id="authLoginBtn" class="bg-teal-500 text-white font-black px-4 py-2 rounded-full hover:bg-teal-600 transition">Login</button>
                <button id="authLogoutBtn" class="hidden bg-red-500 text-white font-black px-4 py-2 rounded-full hover:bg-red-600 transition">Logout</button>
                <button id="themeToggle" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-full text-xl">🌙</button>
            </div>
        </div>
        <div class="container mx-auto flex items-center gap-4 px-2">
            <span class="font-black text-purple-600 text-sm">LVL <span id="levelDisplay">1</span></span>
            <div class="flex-grow bg-gray-200 dark:bg-gray-700 h-3 rounded-full overflow-hidden">
                <div id="xpBar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-full w-0 transition-all duration-1000"></div>
            </div>
            <span class="text-xs font-bold text-gray-500"><span id="xpText">0</span>/100 XP</span>
        </div>
    </nav>

   

    <section id="books" class="container mx-auto py-12 px-6">
        <div id="myBookshelf" class="flex justify-center"></div>
    </section>

    <div id="readerModal" class="fixed inset-0 z-[100] hidden flex flex-col bg-gray-100/95 animate__animated animate__fadeIn">
        <nav class="bg-white p-4 shadow-xl flex justify-between items-center border-b-4 border-teal-400 gap-3">
            <button onclick="closeReader()" class="bg-red-500 text-white font-black px-6 py-2 rounded-2xl hover:bg-red-600 transition">⬅ Exit</button>
            <h2 id="readerTitle" class="text-xl md:text-2xl font-black text-purple-600 truncate px-2 text-center flex-1">Reading Room</h2>
            <div class="flex items-center gap-2">
                <a id="buyBookButton" href="#" target="_blank" rel="noopener noreferrer" class="bg-orange-500 text-white font-black px-4 md:px-5 py-2 rounded-2xl shadow-lg hover:bg-orange-400 whitespace-nowrap">🛒 Get the Physical Book</a>
                <button onclick="toggleReaderMode()" class="bg-yellow-400 p-2 rounded-full" aria-label="Toggle reader mode">🌙</button>
            </div>
        </nav>
        <div id="readerBody" class="relative flex-grow bg-gray-100 p-4 md:p-8">

            <div class="w-full h-full bg-white rounded-3xl shadow-2xl overflow-hidden relative border-4 border-cyan-200">
                <div class="mascot-peek" aria-hidden="true">
                    <img src="logo.png" alt="Dream Club mascot" class="h-16 md:h-20 w-auto drop-shadow-lg">
                </div>
                <iframe id="readerIframe" src="" title="Book Reader" class="w-full h-full border-none"></iframe>
            </div>

        </div>
    </div>

    <div id="rewardBadge" class="fixed bottom-10 right-10 hidden animate__animated animate__bounceIn text-center z-[110]">
        <div class="bg-yellow-400 p-6 rounded-full shadow-2xl border-4 border-white">
            <span class="text-6xl">⭐</span>
        </div>
        <p class="mt-2 bg-white text-purple-600 font-black px-4 py-1 rounded-full shadow-md">+25 XP!</p>
    </div>

    <div id="authModal" class="fixed inset-0 z-[120] hidden items-center justify-center bg-black/50 p-4">
        <div class="w-full max-w-md rounded-3xl border-4 border-teal-300 bg-white p-6 shadow-2xl dark:border-teal-600 dark:bg-gray-900">
            <div class="mb-5 flex items-center justify-between">
                <h3 class="text-2xl font-black text-teal-600">Dream Club Login</h3>
                <button id="closeAuthModalBtn" class="rounded-full bg-gray-100 px-3 py-1 text-lg font-black text-gray-700 dark:bg-gray-800 dark:text-gray-200">X</button>
            </div>

            <p id="authStatus" class="mb-4 rounded-xl bg-teal-50 px-3 py-2 text-sm font-bold text-teal-700 dark:bg-teal-950 dark:text-teal-200">
                Sign in to save your Dream Club progress.
            </p>

            <div class="mb-3">
                <label for="authEmail" class="mb-1 block text-sm font-black text-gray-700 dark:text-gray-200">Email</label>
                <input id="authEmail" type="email" autocomplete="email" class="w-full rounded-xl border-2 border-teal-300 px-3 py-2 font-bold text-gray-700 outline-none focus:border-teal-500 dark:bg-gray-800 dark:text-gray-100" placeholder="you@example.com">
            </div>

            <div class="mb-5">
                <label for="authPassword" class="mb-1 block text-sm font-black text-gray-700 dark:text-gray-200">Password</label>
                <input id="authPassword" type="password" autocomplete="current-password" class="w-full rounded-xl border-2 border-teal-300 px-3 py-2 font-bold text-gray-700 outline-none focus:border-teal-500 dark:bg-gray-800 dark:text-gray-100" placeholder="At least 6 characters">
            </div>

            <div class="flex flex-wrap gap-2">
                <button id="authSignInBtn" class="rounded-full bg-teal-500 px-4 py-2 font-black text-white hover:bg-teal-600">Sign In</button>
                <button id="authSignUpBtn" class="rounded-full bg-orange-500 px-4 py-2 font-black text-white hover:bg-orange-600">Create Account</button>
                <button id="authGoogleBtn" class="rounded-full bg-blue-500 px-4 py-2 font-black text-white hover:bg-blue-600">Sign In with Google</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="Javascript.js"></script>
</body>
</html>
